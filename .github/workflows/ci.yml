name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version/tag consistency check
        if: github.event_name != 'pull_request'
        run: |
          script_ver=$(grep '^version=' gh-pr-context | cut -d'"' -f2)
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -n "$latest_tag" ]; then
            tag_ver="${latest_tag#v}"
            if [ "$script_ver" != "$tag_ver" ]; then
              echo "::error::Version mismatch: script=$script_ver, latest_tag=$tag_ver"
              echo "Bump the version in gh-pr-context to match the tag, or delete the tag."
              exit 1
            fi
          fi
          echo "Version check passed: $script_ver"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Shellcheck
        run: shellcheck gh-pr-context install.sh

      - name: Tests
        run: bash test/run.sh

  version-check:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          SCRIPT_VERSION=$(grep '^version=' gh-pr-context | cut -d'"' -f2)
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          echo "Script version: $SCRIPT_VERSION"
          echo "Tag version:    $TAG_VERSION"
          if [ -z "$SCRIPT_VERSION" ]; then
            echo "::error::Could not extract version from gh-pr-context"
            exit 1
          fi
          if [ "$SCRIPT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: gh-pr-context reports '$SCRIPT_VERSION' but tag is '$TAG_VERSION'"
            exit 1
          fi
          echo "Version check passed: $SCRIPT_VERSION == $TAG_VERSION"
