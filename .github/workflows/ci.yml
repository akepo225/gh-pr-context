name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Shellcheck
        run: shellcheck gh-pr-context install.sh

      - name: Tests
        run: bash test/run.sh
